# Baseline smoke config — small run for quick verification
fuzzing:
  output_folder: outputs/baseline_smoke
  num: 50
  max_llm_calls: 150
  total_time: 1.0
  log_level: 3
  otf: true
  resume: false
  evaluate: false
  use_hand_written_prompt: false
  no_input_prompt: true
  prompt_strategy: 2

target:
  language: cpp
  path_documentation: config/documentation/cpp/cpp_23.md
  path_example_code:
  trigger_to_generate_input: "/* Please create a very short program which uses new C++ features in a complex way */"
  input_hint: "#include <iostream>"
  path_hand_written_prompt:
  target_string: ""

llm:
  temperature: 1
  batch_size: 2
  device: cuda
  model_name: bigcode/starcoderbase-1b
  max_length: 256
