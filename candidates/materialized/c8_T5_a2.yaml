fuzzing:
  evaluate: false
  log_level: 3
  no_input_prompt: true
  num: 10
  otf: true
  output_folder: outputs/repair_smoke
  prompt_strategy: 2
  resume: false
  total_time: 1.0
  use_hand_written_prompt: false
llm:
  batch_size: 2
  device: cuda
  max_length: 2048
  model_name: bigcode/starcoderbase-1b
  temperature: 0.7
repair:
  cache: true
  enabled: true
  error_gate: compile_error
  include_stderr: true
  max_attempts: 2
  max_tokens: 512
  temperature: 0.7
  template_id: T5
  timeout_sec: 3
target:
  input_hint: '#include <iostream>'
  language: cpp
  path_documentation: config/documentation/cpp/cpp_23.md
  path_example_code: null
  path_hand_written_prompt: null
  target_string: ''
  trigger_to_generate_input: /* Please create a very short program which uses new
    C++ features in a complex way */
